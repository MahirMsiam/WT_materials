<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Title</title>
</head>
<body>
    <p>Online Registration Form</p>
    <form>
            <!-- Name -->
        <label for="First name">First Name:</label><br>
        <input type="text" id="First name" name="First name" placeholder="First name">
        
            <!-- Last name -->
        <label for="Last name">Last Name:</label>
        <input type="text" id="Last name" name="Last name" placeholder="Last name"><br>
        <br>
            <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Email address"><br>
        <br>
            <!-- company name -->
        <label for="company name">Company Name(if applicable):</label><br>
        <input type="text" id="company name" name="company name" placeholder="Company name"><br>
        <br>
            <!-- physical Address -->
        <label for="physical address">Physical Address:</label><br>
        <input type="text" id="physical address" name="physical address" placeholder="Physical address"><br>
        <br>
            <!-- DON -->
        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob"><br>
        <br>
    </form>
</html>
